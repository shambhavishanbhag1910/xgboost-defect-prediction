version: "3.9"

services:
  api:
    build: .
    container_name: defect-api
    ports:
      - "8000:8000"

  streamlit:
    build: .
    container_name: defect-streamlit
    command: streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api